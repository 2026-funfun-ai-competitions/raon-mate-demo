spring:
  application:
    name: raon-mate-backend
  profiles:
    default: local
  datasource:
    url: jdbc:h2:file:./data/raonmate;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8085}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    connect-timeout: ${GEMINI_CONNECT_TIMEOUT:3s}
    read-timeout: ${GEMINI_READ_TIMEOUT:30s}
    cache-ttl: ${GEMINI_CACHE_TTL:10m}
    minimum-request-interval: ${GEMINI_MINIMUM_REQUEST_INTERVAL:10s}
    access-token: ${RECOMMENDATION_API_TOKEN:}
